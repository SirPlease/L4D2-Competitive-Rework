[gui]
language = "zh-CN"
anne_stats = true
theme_mode = "light"
accent_color = "#0f766e"
# RCON 密码可在 Tauri 界面勾选保存后自动写入。
# [gui.rcon_passwords]
# "127.0.0.1:27015" = "change-me"

[updater]
auto_check = true

[api]
base_url = "https://anne.trygek.com"
# Steam 登录后会自动写入 token。
# token = "aw_xxx"

[master]
enabled = true
group = "公网大厅"
address = "hl2master.steampowered.com:27011"
region = "all"
filter = "\\appid\\550"
extra_filter = ["\\secure\\1"]
limit = 200

[[groups]]
name = "我的服务器"
servers = [
  "127.0.0.1:27015",
  "steam://connect/127.0.0.1:27016",
]

[[sourcebans]]
name = "Anne 网页订阅"
url = "https://anne.trygek.com/bans/index.php?p=servers"
