; Remove medkit spawns
filter:
{
    "classname" "weapon_first_aid_kit_spawn"
}
; Ensure weapons outside of saferoom are T1s
modify:
{
    match:
    {
        "hammerid" "3357953"
    }
    replace:
    {
        "weapon_selection" "any_smg"
    }
}
{
    match:
    {
        "hammerid" "3357949"
    }
    replace:
    {
        "weapon_selection" "t1_shotgun"
    }
}
