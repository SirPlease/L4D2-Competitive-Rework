; =====================================================
; ==                   STUCK SPOTS                   ==
; ==  Prevent players from getting stuck in the map  ==
; =====================================================

; --- cancel the alarm-door sign model collsion 取消警报门的碰撞
modify:
{
	match:
	{
		"targetname" "emergency_door_sign"
	}
	replace:
	{
		"solid" "0"
	}
}

; --- move func_orator(a model with collision) to clear new Si ladder 将对讲机移开以疏通新特感爬梯（此实体具有碰撞）
modify:
{
	match:
	{
		"targetname" "orator"
	}
	replace:
	{
		"origin" "4516 3664 592"
	}
}

