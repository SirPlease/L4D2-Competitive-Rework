// Network Quality Hint
// 检测玩家 ping/loss/choke，异常时提示打开网页复制服务器 IP/连接命令。

// 是否启用检测。
nqh_enable "1"

// 每隔多少秒检测一次。
nqh_check_interval "20.0"

// ping 超过多少 ms 提醒。-1 关闭 ping 检测。
nqh_ping_limit "120"

// 丢包超过多少百分比提醒。-1 关闭丢包检测。
nqh_loss_limit "2.0"

// choke 超过多少百分比提醒。-1 关闭 choke 检测。
nqh_choke_limit "5.0"

// 连续多少次检测异常才提醒，避免瞬时波动刷屏。
nqh_bad_samples "3"

// 同一玩家两次提醒之间的冷却时间。
nqh_warn_cooldown "180.0"

// 服务器 IP 页面，玩家在这里复制对应服务器的 connect 命令。
nqh_ip_page_url "https://anne.trygek.com/ip.php"

// 玩家进服多少秒后显示一次当前网络状态。0 关闭。
nqh_intro_delay "25.0"
