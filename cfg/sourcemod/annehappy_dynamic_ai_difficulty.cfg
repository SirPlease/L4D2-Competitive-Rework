// AnneHappy Dynamic AI Difficulty
// This file controls how the dynamic difficulty plugin selects and applies a difficulty.
// Per-level Special Infected/Tank values are stored in:
// addons/sourcemod/configs/AnneHappy/dynamic_ai_difficulty.cfg

// Enable dynamic AI difficulty.
// 0 = off, 1 = on
ah_ai_dynamic_enable "1"

// Before survivors leave saferoom, retry reading l4d_stats every N seconds until difficulty is locked.
ah_ai_dynamic_check_interval "5.0"

// PPM thresholds. Team PPM is the arithmetic average of current survivors' personal PPM.
// < normal = easy
// normal <= PPM < hard = normal
// hard <= PPM < expert = hard
// expert <= PPM < extreme = expert
// >= extreme = extreme
ah_ai_dynamic_ppm_normal "30.89"
ah_ai_dynamic_ppm_hard "43.23"
ah_ai_dynamic_ppm_expert "63.70"
ah_ai_dynamic_ppm_extreme "77.57"

// Threshold source.
// 0 = use fixed PPM thresholds above
// 1 = read daily percentile thresholds from database table
ah_ai_dynamic_threshold_mode "1"

// Database config name from addons/sourcemod/configs/databases.cfg.
ah_ai_dynamic_threshold_db_config "l4dstats"

// Database table containing precomputed daily PPM thresholds.
// The plugin creates this table if missing, but your web/cron job should update row id=1.
ah_ai_dynamic_threshold_table "ai_dynamic_ppm_thresholds"

// Max accepted age for database thresholds in seconds.
// 0 = never expire; default 172800 = 2 days.
ah_ai_dynamic_threshold_max_age "172800"

// Fixed difficulty override.
// 0 = auto by PPM
// 1 = easy, 2 = normal, 3 = hard, 4 = expert, 5 = extreme
ah_ai_dynamic_fixed_level "0"

// Difficulty profile config path, relative to addons/sourcemod.
ah_ai_dynamic_config "configs/AnneHappy/dynamic_ai_difficulty.cfg"

// After the round difficulty is locked, re-apply the current level cvars every N seconds.
// This prevents old direct-cvar votes or manual sm_cvar changes from leaving extreme values active.
// 0 = disable.
ah_ai_dynamic_enforce_interval "10.0"

// Prefer current-quarter score / current-quarter playtime for each player.
// Current default is 0 because the existing quarter playtime started later than quarter score,
// which makes current-quarter PPM too high. Set to 1 after a clean full quarter is available.
ah_ai_dynamic_use_quarter_stats "0"

// If quarter stats are enabled and a player's current-quarter playtime is below this many minutes,
// the plugin falls back to total score / total playtime for that player. 300 minutes = 5 hours.
ah_ai_dynamic_quarter_min_minutes "300"

// Announce selected/locked difficulty in chat.
// 0 = off, 1 = on
ah_ai_dynamic_announce "1"

// Debug logging.
// 0 = off, 1 = on
ah_ai_dynamic_debug "0"
