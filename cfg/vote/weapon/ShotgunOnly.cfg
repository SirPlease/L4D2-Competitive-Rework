l4d2_addweaponrule smg_mp5               shotgun_chrome
l4d2_addweaponrule rifle                 pumpshotgun
l4d2_addweaponrule rifle_desert          shotgun_chrome
l4d2_addweaponrule rifle_ak47            pumpshotgun
l4d2_addweaponrule rifle_sg552           shotgun_chrome
l4d2_addweaponrule autoshotgun           pumpshotgun
l4d2_addweaponrule shotgun_spas          shotgun_chrome
l4d2_addweaponrule hunting_rifle         shotgun_chrome
l4d2_addweaponrule sniper_military       shotgun_chrome
l4d2_addweaponrule sniper_scout          pumpshotgun
l4d2_addweaponrule sniper_awp            shotgun_chrome
l4d2_addweaponrule grenade_launcher      pumpshotgun
l4d2_addweaponrule rifle_m60             shotgun_chrome
